name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install UPX
        run: sudo apt-get update && sudo apt-get install -y upx-ucl

      - name: Build linux/amd64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          go build \
            -trimpath \
            -tags "ts_omit_aws ts_omit_bird ts_omit_tap ts_omit_kube ts_omit_capture ts_omit_ssh ts_omit_taildrop ts_omit_relayserver ts_omit_wakeonlan ts_omit_desktop_sessions ts_omit_tpm ts_omit_completion ts_omit_completion_scripts" \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o dist/remote-tools-linux-amd64 \
            .

      - name: Create compressed variants
        run: |
          cd dist
          # Gzip alongside the plain binary (keeps original, -k).
          gzip -9 -k -f remote-tools-linux-amd64
          mv remote-tools-linux-amd64.gz remote-tools-linux-amd64.gz.tmp
          # UPX rewrites in place; work on a copy so the plain binary is
          # preserved as the default artifact.
          cp remote-tools-linux-amd64 remote-tools-linux-amd64.upx
          upx --best --lzma remote-tools-linux-amd64.upx
          mv remote-tools-linux-amd64.gz.tmp remote-tools-linux-amd64.gz

      - name: Generate checksums
        run: |
          cd dist
          sha256sum \
            remote-tools-linux-amd64 \
            remote-tools-linux-amd64.gz \
            remote-tools-linux-amd64.upx \
            > SHA256SUMS

      - name: Show artifact sizes
        run: ls -lh dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-tools-linux-amd64
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/remote-tools-linux-amd64
            dist/remote-tools-linux-amd64.gz
            dist/remote-tools-linux-amd64.upx
            dist/SHA256SUMS
