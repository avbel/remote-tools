name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build linux/amd64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          go build \
            -trimpath \
            -tags "ts_omit_aws ts_omit_bird ts_omit_tap ts_omit_kube ts_omit_capture" \
            -ldflags "-s -w -X main.Version=${VERSION}" \
            -o dist/remote-tools-linux-amd64 \
            .
          (cd dist && sha256sum remote-tools-linux-amd64 > remote-tools-linux-amd64.sha256)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-tools-linux-amd64
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/remote-tools-linux-amd64
            dist/remote-tools-linux-amd64.sha256
